services:
  - type: web
    name: mavi-lp
    runtime: static
    buildCommand: echo "Static site — no build needed"
    staticPublishPath: .
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=2592000
    routes:
      - type: redirect
        source: /after-hours
        destination: /?v=b
      - type: rewrite
        source: /*
        destination: /index.html
